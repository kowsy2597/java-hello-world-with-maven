on: [push]

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      - uses: actions/checkout@v5
      - id: foo
        uses: kowsy2597/hello-world-composite-action@git@github.com:kowsy2597/hello-world-composite-action.git
        with:
          who-to-greet: 'kowsy sarath'
      - run: echo random-number "$RANDOM_NUMBER"
        shell: bash
        env:
          RANDOM_NUMBER: ${{ steps.foo.outputs.random-number }}
